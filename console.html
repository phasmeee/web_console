<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Web</title>
    <!-- Lien vers le fichier CSS dans le dossier /css -->
    <link rel="stylesheet" href="css/consolestyle.css">
</head>
<body>
    <div id="console-container">
        <div id="console-output"></div>
        <!-- Ligne séparatrice -->
        <hr id="separator">
        <div id="console-input">
            <span id="prompt">user@web:~$ </span><input type="text" id="command-input" autofocus>
        </div>
    </div>
    <!-- Lien vers le fichier JavaScript dans le dossier /js -->
    <script src="js/consolecommand.js"></script>
</body>
</html>
